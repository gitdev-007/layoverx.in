<script>
document.addEventListener("DOMContentLoaded", () => {
    const airport = localStorage.getItem("airport") || "CSIA T2, Mumbai";
    const durationHours = parseFloat(localStorage.getItem("duration") || "6.5");
    const dateTime = localStorage.getItem("dateTime") || "2026-04-27T14:30";
    const finalPlan = JSON.parse(localStorage.getItem("finalPlan") || "[]");

    const contextSummary = document.getElementById("contextSummary");
    const formattedDate = dateTime ? new Date(dateTime).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "No Date";
    if (contextSummary) contextSummary.textContent = `${airport} • ${durationHours}h • ${formattedDate}`;

    const summaryContainer = document.getElementById("summaryContainer");
    const completeBookingBtn = document.getElementById("completeBookingBtn");
    const successOverlay = document.getElementById("successOverlay");

    let totalCost = 0;
    let totalMinutes = 0;

    const itemsHtml = finalPlan.map(item => {
        const costMatch = item.price.match(/\d+/);
        const cost = costMatch ? parseInt(costMatch[0]) : 0;
        const minutes = parseInt(item.duration.match(/\d+/)[0]);
        totalCost += cost;
        totalMinutes += minutes;
        
        return `
            <div class="flex justify-between items-center py-4 border-b border-white/5 last:border-0">
                <div>
                    <h4 class="text-white font-bold">${item.title}</h4>
                    <p class="text-xs text-white/40 uppercase tracking-widest">${item.duration} • ${item.category}</p>
                </div>
                <span class="text-white font-bold">${item.price}</span>
            </div>
        `;
    }).join('');

    summaryContainer.innerHTML = `
        <div class="space-y-4">
            ${itemsHtml}
        </div>
        <div class="pt-8 space-y-4">
            <div class="flex justify-between text-sm">
                <span class="text-white/40">Total Planned Time</span>
                <span class="text-white font-bold">${Math.floor(totalMinutes/60)}h ${totalMinutes%60}m</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-white/40">Layover Duration</span>
                <span class="text-white font-bold">${durationHours}h</span>
            </div>
            <div class="h-px bg-white/10 w-full"></div>
            <div class="flex justify-between items-end">
                <span class="text-[#FF6B00] font-bold">Total Amount</span>
                <span class="text-3xl font-black text-white">Rs ${totalCost}</span>
            </div>
        </div>
    `;

    completeBookingBtn.addEventListener("click", () => {
        successOverlay.classList.remove("hidden");
        // We keep local storage for a better demo experience, or clear it if requested.
        // localStorage.clear(); 
    });
});
</script>
