<script>
document.addEventListener("DOMContentLoaded", () => {
    if (window.initStepNavigation) window.initStepNavigation(5);

    const finalPlan = JSON.parse(localStorage.getItem("finalPlan") || "[]");
    const summaryContainer = document.getElementById("summaryContainer");
    const completeBookingBtn = document.getElementById("completeBookingBtn");
    const successOverlay = document.getElementById("successOverlay");

    let totalCost = 0;
    let totalMinutes = 0;

    const itemsHtml = finalPlan.map(item => {
        const costMatch = (item.price || "0").match(/\d+/);
        const cost = costMatch ? parseInt(costMatch[0]) : 0;
        const durationMatch = (item.duration || "0").match(/\d+/);
        const minutes = durationMatch ? parseInt(durationMatch[0]) : 0;
        totalCost += cost;
        totalMinutes += minutes;
        
        return `
            <div class="flex justify-between items-center py-4 border-b border-white/5 last:border-0 transition-all duration-300 hover:bg-white/5 px-2 rounded-xl">
                <div>
                    <h4 class="text-white font-bold font-['Space_Grotesk']">${item.title}</h4>
                    <p class="text-xs text-white/40 uppercase tracking-widest font-['Space_Grotesk']">${item.duration} • ${item.category}</p>
                </div>
                <span class="text-white font-bold font-['Space_Grotesk']">${item.price}</span>
            </div>
        `;
    }).join('');

    summaryContainer.innerHTML = `
        <div class="space-y-4">
            ${itemsHtml}
        </div>
        <div class="pt-8 space-y-4">
            <div class="flex justify-between text-sm font-['Space_Grotesk'] uppercase tracking-widest">
                <span class="text-white/40">Total Planned Time</span>
                <span class="text-white font-bold">${Math.floor(totalMinutes/60)}h ${totalMinutes%60}m</span>
            </div>
            <div class="h-px bg-white/10 w-full"></div>
            <div class="flex justify-between items-end">
                <span class="text-[#FF6B00] font-bold font-['Space_Grotesk'] uppercase tracking-[0.2em]">Total Amount</span>
                <span class="text-3xl font-black text-white font-['Space_Grotesk']">$${totalCost}</span>
            </div>
        </div>
    `;

    completeBookingBtn.addEventListener("click", () => {
        successOverlay.classList.remove("hidden");
    });
});
</script>
