document.addEventListener("DOMContentLoaded", () => {
    if (window.initStepNavigation) window.initStepNavigation(4);

    const airport = localStorage.getItem("airport") || "CSIA T2, Mumbai";
    const durationHours = parseFloat(localStorage.getItem("duration") || "6.5");
    const dateTime = localStorage.getItem("dateTime") || "2026-04-27T14:30";
    let priorityList = JSON.parse(localStorage.getItem("priorityList") || "[]");

    const contextSummary = document.getElementById("contextSummary");
    const formattedDate = dateTime ? new Date(dateTime).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "No Date";
    if (contextSummary) contextSummary.textContent = `${airport} • ${durationHours}h • ${formattedDate}`;

    const timelineContainer = document.getElementById("timelineContainer");
    const confirmPlanBtn = document.getElementById("confirmPlanBtn");
    const editToggleBtn = document.getElementById("editToggleBtn");
    const replaceModal = document.getElementById("replaceModal");
    const replacementOptions = document.getElementById("replacementOptions");
    const closeReplaceModal = document.getElementById("closeReplaceModal");

    let isEditMode = false;
    let replacingIndex = -1;

    function savePlanState() {
        localStorage.setItem("finalPlan", JSON.stringify(priorityList));
        if (window.initStepNavigation) window.initStepNavigation(4);
    }

    function renderTimeline() {
        timelineContainer.innerHTML = `
            <div class="absolute -left-[5px] top-4 w-2 h-2 rounded-full bg-[#FF6B00]"></div>
            <div class="absolute -left-[5px] bottom-4 w-2 h-2 rounded-full bg-white/20"></div>
        `;

        const arrivalTime = new Date(dateTime);
        addTimelineItem("Arrive at " + airport, "Start of layover", arrivalTime, "flight_land", false);

        let currentTime = new Date(arrivalTime.getTime() + 45 * 60000); 

        priorityList.forEach((item, index) => {
            const minutes = parseInt(item.duration.match(/\d+/)[0]);
            addTimelineItem(item.title, item.category + " • " + item.price, new Date(currentTime), "event", true, index, minutes);
            currentTime = new Date(currentTime.getTime() + minutes * 60000 + 15 * 60000); 
        });

        const departureTime = new Date(arrivalTime.getTime() + durationHours * 3600000);
        addTimelineItem("Boarding at " + airport, "45 min before flight", new Date(departureTime.getTime() - 45 * 60000), "flight_takeoff", false);
    }

    function addTimelineItem(title, subtitle, time, icon, isActivity, index, duration) {
        const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement("div");
        div.className = "relative group";
        div.innerHTML = `
            <span class="absolute -left-28 top-0 text-[10px] font-bold text-white/40 w-20 text-right">${timeStr}</span>
            <div class="glass-card p-5 rounded-2xl ${isActivity ? 'bg-[#FF6B00]/5 border-[#FF6B00]/20' : 'bg-white/5 border-white/10'} flex justify-between items-center">
                <div class="flex items-center gap-4 flex-grow">
                    <span class="material-symbols-outlined ${isActivity ? 'text-[#FF6B00]' : 'text-white/40'} text-xl">${icon}</span>
                    <div class="flex-grow">
                        <h4 class="text-white font-bold text-sm">${title}</h4>
                        <p class="text-[10px] text-white/40 uppercase tracking-wider mt-0.5">${subtitle}</p>
                    </div>
                </div>
                ${isActivity && isEditMode ? `
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 bg-black/40 px-3 py-1.5 rounded-lg border border-white/10">
                            <input type="number" value="${duration}" class="w-12 bg-transparent text-white text-xs font-bold text-center outline-none" onchange="updateDuration(${index}, this.value)">
                            <span class="text-[10px] text-white/40 font-bold">MIN</span>
                        </div>
                        <button class="px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-white text-[10px] font-bold hover:bg-white/10" onclick="openReplace(${index})">REPLACE</button>
                        <button class="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all" onclick="deleteItem(${index})">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                ` : isActivity ? `
                     <span class="text-[10px] font-bold text-[#FF6B00] bg-[#FF6B00]/10 px-2 py-1 rounded">${duration} MIN</span>
                ` : ''}
            </div>
        `;
        timelineContainer.appendChild(div);
    }

    window.updateDuration = (index, newVal) => {
        const val = parseInt(newVal);
        if (val > 0) {
            priorityList[index].duration = val + " MIN";
            savePlanState();
            renderTimeline();
        }
    };

    window.deleteItem = (index) => {
        priorityList.splice(index, 1);
        savePlanState();
        renderTimeline();
    };

    window.openReplace = (index) => {
        replacingIndex = index;
        const category = priorityList[index].category;
        const options = REAL_SERVICES_DATA[category] || [];
        
        replacementOptions.innerHTML = options.map(opt => `
            <div class="glass-card p-4 rounded-2xl border border-white/5 hover:border-[#FF6B00]/30 cursor-pointer transition-all" onclick="replaceItem('${opt.id}', '${category}')">
                <div class="flex gap-4">
                    <img src="${opt.image}" class="w-16 h-16 rounded-xl object-cover">
                    <div>
                        <h4 class="text-white font-bold text-sm">${opt.title}</h4>
                        <p class="text-[10px] text-white/40 mt-1">${opt.desc}</p>
                        <p class="text-[#FF6B00] font-bold text-xs mt-2">${opt.price}</p>
                    </div>
                </div>
            </div>
        `).join('');
        
        replaceModal.classList.remove("hidden");
    };

    window.replaceItem = (id, category) => {
        const newItem = REAL_SERVICES_DATA[category].find(o => o.id === id);
        if (newItem) {
            priorityList[replacingIndex] = JSON.parse(JSON.stringify(newItem));
            savePlanState();
            replaceModal.classList.add("hidden");
            renderTimeline();
        }
    };

    closeReplaceModal.onclick = () => replaceModal.classList.add("hidden");

    editToggleBtn.addEventListener("click", () => {
        isEditMode = !isEditMode;
        editToggleBtn.textContent = isEditMode ? "Done Editing" : "Edit Plan";
        renderTimeline();
    });

    confirmPlanBtn.addEventListener("click", () => {
        savePlanState();
        window.handleStepNavigation("finalize.html");
    });

    renderTimeline();
    // Initial state save to enable the "Finalize" link if data exists
    if (priorityList.length > 0) savePlanState();
});
</script>
</body></html>
