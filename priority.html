<script>
document.addEventListener("DOMContentLoaded", () => {
    if (window.initStepNavigation) window.initStepNavigation(3);

    let selectedOptions = JSON.parse(localStorage.getItem("selectedOptions") || "[]");
    const priorityList = document.getElementById("priorityList");
    const buildPlanBtn = document.getElementById("buildPlanBtn");

    function renderList() {
        priorityList.innerHTML = "";
        selectedOptions.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "glass-dark p-6 rounded-2xl flex items-center gap-6 border border-white/5 hover:border-orange-500/30 transition-all";
            div.innerHTML = `
                <div class="text-3xl font-black text-white/10 italic w-12 font-['Space_Grotesk']">${String(index + 1).padStart(2, '0')}</div>
                <div class="flex-grow">
                    <h3 class="text-white font-bold text-lg font-['Space_Grotesk']">${item.title}</h3>
                    <p class="text-white/40 text-sm">${item.duration} • ${item.price}</p>
                    <p class="text-orange-500/60 text-[10px] uppercase font-bold tracking-widest mt-1">${item.category}</p>
                </div>
                <div class="flex flex-col gap-2">
                    <button class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-orange-500 hover:text-black transition-all" onclick="moveItem(${index}, -1)">
                        <span class="material-symbols-outlined">expand_less</span>
                    </button>
                    <button class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-orange-500 hover:text-black transition-all" onclick="moveItem(${index}, 1)">
                        <span class="material-symbols-outlined">expand_more</span>
                    </button>
                </div>
            `;
            priorityList.appendChild(div);
        });
    }

    window.moveItem = (index, direction) => {
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < selectedOptions.length) {
            const temp = selectedOptions[index];
            selectedOptions[index] = selectedOptions[newIndex];
            selectedOptions[newIndex] = temp;
            localStorage.setItem("priorityList", JSON.stringify(selectedOptions));
            renderList();
            if (window.initStepNavigation) window.initStepNavigation(3);
        }
    };

    buildPlanBtn.addEventListener("click", () => {
        localStorage.setItem("priorityList", JSON.stringify(selectedOptions));
        window.handleStepNavigation("plan.html");
    });

    renderList();
    // Ensure priorityList exists for navigation validation
    if (selectedOptions.length > 0) localStorage.setItem("priorityList", JSON.stringify(selectedOptions));
});
</script>
