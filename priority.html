            Build My Plan
            <span class="material-symbols-outlined">arrow_forward</span>
</button>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const airport = localStorage.getItem("airport") || "CSIA T2, Mumbai";
    const duration = localStorage.getItem("duration") || "6.5";
    const dateTime = localStorage.getItem("dateTime") || "2026-04-27T14:30";
    let selectedOptions = JSON.parse(localStorage.getItem("selectedOptions") || "[]");

    const contextSummary = document.getElementById("contextSummary");
    const formattedDate = dateTime ? new Date(dateTime).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "No Date";
    if (contextSummary) contextSummary.textContent = `${airport} • ${duration}h • ${formattedDate}`;

    const priorityList = document.getElementById("priorityList");
    const buildPlanBtn = document.getElementById("buildPlanBtn");

    function renderList() {
        priorityList.innerHTML = "";
        selectedOptions.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "glass-card p-6 rounded-2xl flex items-center gap-6 border border-white/5 hover:border-[#FF6B00]/30 transition-all";
            div.innerHTML = `
                <div class="text-3xl font-black text-white/10 italic w-12">${String(index + 1).padStart(2, '0')}</div>
                <div class="flex-grow">
                    <h3 class="text-white font-bold text-lg">${item.title}</h3>
                    <p class="text-white/40 text-sm">${item.duration} • ${item.price}</p>
                    <p class="text-white/20 text-xs mt-1">${item.category}</p>
                </div>
                <div class="flex flex-col gap-2">
                    <button class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-[#FF6B00] hover:text-black transition-all" onclick="moveItem(${index}, -1)">
                        <span class="material-symbols-outlined">expand_less</span>
                    </button>
                    <button class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-[#FF6B00] hover:text-black transition-all" onclick="moveItem(${index}, 1)">
                        <span class="material-symbols-outlined">expand_more</span>
                    </button>
                </div>
            `;
            priorityList.appendChild(div);
        });
    }

    window.moveItem = (index, direction) => {
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < selectedOptions.length) {
            const temp = selectedOptions[index];
            selectedOptions[index] = selectedOptions[newIndex];
            selectedOptions[newIndex] = temp;
            renderList();
        }
    };

    buildPlanBtn.addEventListener("click", () => {
        localStorage.setItem("priorityList", JSON.stringify(selectedOptions));
        window.location.href = "plan.html";
    });

    renderList();
});
</script>
