document.addEventListener("DOMContentLoaded", () => {
    const airport = localStorage.getItem("airport") || "CSIA T2, Mumbai";
    const duration = localStorage.getItem("duration") || "6.5";
    const dateTime = localStorage.getItem("dateTime") || "2026-04-27T14:30";
    const selectedServices = JSON.parse(localStorage.getItem("selectedServices") || "[]");

    const contextSummary = document.getElementById("contextSummary");
    const formattedDate = dateTime ? new Date(dateTime).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "No Date";
    if (contextSummary) contextSummary.textContent = `${airport} • ${duration}h • ${formattedDate}`;

    const optionsContainer = document.getElementById("optionsContainer");
    const ctaContainer = document.getElementById("ctaContainer");
    const continueBtn = document.getElementById("continueToPriorityBtn");
    const selectedOptions = new Set();

    function updateCTA() {
        if (selectedOptions.size > 0) ctaContainer.classList.remove("hidden");
        else ctaContainer.classList.add("hidden");
    }

    selectedServices.forEach(service => {
        const options = REAL_SERVICES_DATA[service] || [];
        if (options.length === 0) return;

        const section = document.createElement("section");
        section.className = "mb-16";
        section.innerHTML = `
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="font-headline-lg text-headline-lg text-white">${service} Options</h2>
                    <p class="text-white/40">Real-time availability near your location</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                ${options.map(opt => `
                    <div class="glass-card rounded-2xl overflow-hidden group border border-transparent transition-all" data-option-id="${opt.id}">
                        <div class="h-48 relative">
                            <img src="${opt.image}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                            <div class="absolute top-4 right-4 bg-black/40 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold text-[#FF6B00] border border-white/10">
                                ${opt.duration}
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-headline-md text-lg text-white">${opt.title}</h3>
                                <div class="flex items-center gap-1 text-[#FF6B00]">
                                    <span class="material-symbols-outlined text-sm">star</span>
                                    <span class="text-xs font-bold">${opt.rating}</span>
                                </div>
                            </div>
                            <p class="text-sm text-white/40 mb-2">${opt.desc}</p>
                            <p class="text-[#FF6B00] font-bold mb-6">${opt.price}</p>
                            <button class="w-full py-3 rounded-xl bg-white/5 border border-white/10 text-white font-semibold text-sm hover:bg-[#FF6B00] hover:text-black transition-all select-opt-btn" data-id="${opt.id}">Add to Plan</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        optionsContainer.appendChild(section);
    });

    optionsContainer.addEventListener("click", (e) => {
        if (e.target.classList.contains("select-opt-btn")) {
            const btn = e.target;
            const id = btn.getAttribute("data-id");
            const card = btn.closest("[data-option-id]");
            
            if (selectedOptions.has(id)) {
                selectedOptions.delete(id);
                btn.textContent = "Add to Plan";
                btn.classList.remove("bg-[#FF6B00]", "text-black");
                btn.classList.add("bg-white/5", "text-white");
                card.classList.remove("border-[#FF6B00]", "ring-1", "ring-[#FF6B00]/20");
            } else {
                selectedOptions.add(id);
                btn.textContent = "Added";
                btn.classList.add("bg-[#FF6B00]", "text-black");
                btn.classList.remove("bg-white/5", "text-white");
                card.classList.add("border-[#FF6B00]", "ring-1", "ring-[#FF6B00]/20");
            }
            updateCTA();
        }
    });

    continueBtn.addEventListener("click", () => {
        const selectedArray = [];
        selectedOptions.forEach(id => {
            Object.values(REAL_SERVICES_DATA).forEach(opts => {
                const found = opts.find(o => o.id === id);
                if (found) selectedArray.push(found);
            });
        });
        localStorage.setItem("selectedOptions", JSON.stringify(selectedArray));
        window.location.href = "priority.html";
    });
});
</script>
</body></html>
